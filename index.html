// ── APP ──────────────────────────────────────────────────────────────
function App(){
  const [skin,setSkin]=useState(()=>LS.get("skin","dark"));
  const t=THEMES[skin]||THEMES.dark;

  const [page,setPage]=useState("home");
  const [stories,setStories]=useState(()=>LS.get("stories",D0_STORIES));
  const [chars,setChars]=useState(()=>LS.get("chars",D0_CHARS));
  const [vests,setVests]=useState(()=>LS.get("vests",D0_VESTS));
  const [worlds,setWorlds]=useState(()=>LS.get("worlds",D0_WORLDS));

  // API settings
  const [apiBase,setApiBase]=useState(()=>LS.get("apiBase","https://api.anthropic.com"));
  const [apiKey,setApiKey]=useState(()=>LS.get("apiKey",""));
  const [apiModel,setApiModel]=useState(()=>LS.get("apiModel","claude-sonnet-4-20250514"));
  const [apiTemp,setApiTemp]=useState(()=>LS.get("apiTemp",0.8));
  const [apiTokens,setApiTokens]=useState(()=>LS.get("apiTokens",1200));

  // reading settings
  const [fontSize,setFontSize]=useState(()=>LS.get("fontSize",14));
  const [fontFace,setFontFace]=useState(()=>LS.get("fontFace","serif"));
  const [typewriter,setTypewriter]=useState(()=>LS.get("typewriter",true));
  const [dispMode,setDispMode]=useState(()=>LS.get("dispMode","novel"));
  const [bgImg,setBgImg]=useState(()=>LS.get("bgImg",""));

  // story state
  const [activeId,setActiveId]=useState(null);
  const [selVestId,setSelVestId]=useState(()=>LS.get("selVestId",1));
  const [selWorldIds,setSelWorldIds]=useState(()=>LS.get("selWorldIds",[1]));
  const [selCharIds,setSelCharIds]=useState(()=>LS.get("selCharIds",[1]));
  const [branches,setBranches]=useState(null);
  const [generating,setGenerating]=useState(false);
  // input state 移到 StoryPage 内部
  const [scene,setScene]=useState("");
  const [showSearch,setShowSearch]=useState(false);
  const [searchQ,setSearchQ]=useState("");
  const [showBM,setShowBM]=useState(false);

  // modal
  const [modal,setModal]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [relModal,setRelModal]=useState(null);
  const [storyPin,setStoryPin]=useState({});   // {storyId: "pin码"}
  const [lockedStories,setLockedStories]=useState({});  // {storyId: true/false已解锁}
  const [fetchingModels,setFetchingModels]=useState(false);
  const [modelList,setModelList]=useState([]);

  const chatRef=useRef(null);

  const activeStory=stories.find(s=>s.id===activeId)||null;
  const selVest=vests.find(v=>v.id===selVestId)||vests[0];
  const selWorlds=worlds.filter(w=>selWorldIds.includes(w.id));
  const selChars=chars.filter(c=>selCharIds.includes(c.id));

  // persist
  useEffect(()=>LS.set("skin",skin),[skin]);
  useEffect(()=>LS.set("stories",stories),[stories]);
  useEffect(()=>LS.set("chars",chars),[chars]);
  useEffect(()=>LS.set("vests",vests),[vests]);
  useEffect(()=>LS.set("worlds",worlds),[worlds]);
  useEffect(()=>LS.set("apiBase",apiBase),[apiBase]);
  useEffect(()=>LS.set("apiKey",apiKey),[apiKey]);
  useEffect(()=>LS.set("apiModel",apiModel),[apiModel]);
  useEffect(()=>LS.set("apiTemp",apiTemp),[apiTemp]);
  useEffect(()=>LS.set("apiTokens",apiTokens),[apiTokens]);
  useEffect(()=>LS.set("fontSize",fontSize),[fontSize]);
  useEffect(()=>LS.set("fontFace",fontFace),[fontFace]);
  useEffect(()=>LS.set("typewriter",typewriter),[typewriter]);
  useEffect(()=>LS.set("dispMode",dispMode),[dispMode]);
  useEffect(()=>LS.set("bgImg",bgImg),[bgImg]);
  useEffect(()=>LS.set("selVestId",selVestId),[selVestId]);
  useEffect(()=>LS.set("selWorldIds",selWorldIds),[selWorldIds]);
  useEffect(()=>LS.set("selCharIds",selCharIds),[selCharIds]);

  useEffect(()=>{
    if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;
  },[activeStory?.msgs,generating,branches]);

  // story helpers
  const updMsgs=(id,fn)=>setStories(p=>p.map(s=>s.id===id?{...s,msgs:fn(s.msgs||[])}:s));
  const updStory=(id,fn)=>setStories(p=>p.map(s=>s.id===id?fn(s):s));

  // generate
  const generate=async(userInput,isRand=false)=>{
    if(!apiKey){alert("请先在设置中填写 API Key");return;}
    if(!activeId){alert("请先选择一个故事");return;}
    setGenerating(true);setBranches(null);
    const wp=selWorlds.map(w=>w.prompt).join("\n");
    const cp=selChars.map(c=>`角色${c.name}（${c.pronoun}/${c.pov}）：${c.setting}`).join("\n");
    const vp=selVest?`玩家马甲「${selVest.name}」（${selVest.pronoun}/${selVest.pov}）：${selVest.setting}`:"";
    const sp=scene?`当前场景：${scene}`:"";
    const st=stories.find(s=>s.id===activeId);
    const hist=(st?.msgs||[]).slice(-10).map(m=>m.type==="player"?`玩家：${m.content}`:m.content).join("\n");
    // 角色单独记忆
    const charMemories=selChars.map(c=>{
      const memKey="mem_"+activeId+"_"+c.id;
      const mem=LS.get(memKey,"");
      return mem?`${c.name}的记忆摘要：${mem}`:"";
    }).filter(Boolean).join("\n");
    // 隐藏剧情触发词
    const st2=stories.find(s=>s.id===activeId);
    const triggers=(st2?.triggers||[]);
    const triggerPrompt=triggers.length>0?`隐藏剧情触发词（当对话包含以下词语时触发对应隐藏剧情）：${triggers.map(t=>t.keyword+"→"+t.event).join("；")}`:"";
    // 检查当前输入是否触发隐藏剧情
    const matchedTrigger=triggers.find(t=>userInput&&userInput.includes(t.keyword));
    const triggerInject=matchedTrigger?`\n【隐藏剧情触发】玩家触发了关键词「${matchedTrigger.keyword}」，请发生以下隐藏事件：${matchedTrigger.event}`:"";
    const sys=`你是顶级沉浸式互动小说AI，用中文生成精彩剧情。
世界观：${wp}
${cp}
${vp}
${sp}
规则：旁白描述环境动作，对话用「」引号。结尾严格按格式：【分支A】内容【分支B】内容【分支C】内容
${charMemories}
${triggerPrompt}`;
    try{
      const base=apiBase.replace(/\/+$/,"");
      const res=await fetch(base+"/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:apiModel,max_tokens:apiTokens,temperature:apiTemp,system:sys,
          messages:[{role:"user",content:hist+(userInput?"\n玩家："+userInput+triggerInject:isRand?"\n发生随机意外事件":"\n请继续推进剧情")}]})
      });
      const data=await res.json();
      if(data.error){throw new Error(data.error.message||"API错误");}
      const raw=data.content?.[0]?.text||"";
      const bm=raw.match(/【分支A】([\s\S]+?)【分支B】([\s\S]+?)【分支C】([\s\S]+)/);
      const main=bm?raw.replace(/【分支A】[\s\S]*/,"").trim():raw;
      const nb=bm?[bm[1].trim(),bm[2].trim(),bm[3].trim()]:null;
      const parts=main.split(/(「[^」]*」)/g).filter(s=>s.trim());
      const newMsgs=[];
      let ci=0;
      for(const part of parts){
        if(part.startsWith("「")){
          const c=selChars[ci%Math.max(selChars.length,1)];
          newMsgs.push({id:Date.now()+Math.random(),type:"char",char:c?.name||"角色",color:c?.color||"#9b7dd4",content:part.trim()});
          ci++;
        }else if(part.trim()){
          newMsgs.push({id:Date.now()+Math.random(),type:"narr",content:part.trim()});
        }
      }
      if(!newMsgs.length) newMsgs.push({id:Date.now(),type:"narr",content:main});
      updMsgs(activeId,prev=>[...prev,...newMsgs]);
      updStory(activeId,s=>({...s,turns:(s.turns||0)+1,lastPlayed:"刚刚"}));
      // 更新角色记忆（保存最近5条剧情摘要）

        const memKey="mem_"+activeId+"_"+c.id;
        const oldMem=LS.get(memKey,"");
        const newSnippet=main.slice(0,120);
        const updated=(oldMem+"\n"+newSnippet).split("\n").slice(-8).join("\n");
        LS.set(memKey,updated);
      });
      if(nb) setBranches(nb);
    }catch(err){

          h('div',{style:{fontSize:13,fontWeight:600,color:t.text,marginBottom:8}},"🎋 关于竹林"),
          h('div',{style:{fontSize:12,color:t.muted,lineHeight:2.0}},
            "竹林 v5.0 · 完整版",h('br'),
            "沉浸式AI互动小说创作工具",h('br'),
            "数据自动保存至本地浏览器"
          )
        )
      )
    );
  }

  // ── NAV ───────────────────────────────────────────────────────────
  const NAV=[
    {id:"home",l:"主页",n:"home"},
    {id:"story",l:"剧情",n:"book"},
    {id:"characters",l:"角色卡",n:"user"},
    {id:"vestments",l:"马甲",n:"mask"},
    {id:"worldbooks",l:"世界书",n:"globe"},
    {id:"settings",l:"设置",n:"settings"},
  ];

  const renderPage=()=>{
    switch(page){
      case"home":return h(HomePage);
      case"story":return h(StoryPage);
      case"characters":return h(CharsPage);
      case"vestments":return h(VestsPage);
      case"worldbooks":return h(WorldsPage);
      case"settings":return h(SettingsPage);
      default:return h(HomePage);
    }
  };

  // ── MODALS ────────────────────────────────────────────────────────
  const saveChar=()=>{
    if(!editItem?.name)return;
    if(editItem.id)setChars(p=>p.map(c=>c.id===editItem.id?editItem:c));
    else setChars(p=>[...p,{...editItem,id:Date.now()}]);
    closeModal();
  };
  const saveVest=()=>{
    if(!editItem?.name)return;
    if(editItem.id)setVests(p=>p.map(v=>v.id===editItem.id?editItem:v));
    else setVests(p=>[...p,{...editItem,id:Date.now()}]);
    closeModal();
  };
  const saveWorld=()=>{
    if(!editItem?.name)return;
    if(editItem.id)setWorlds(p=>p.map(w=>w.id===editItem.id?editItem:w));
    else setWorlds(p=>[...p,{...editItem,id:Date.now(),tags:[]}]);
    closeModal();
  };
  const saveStory=()=>{
    if(!editItem?.title)return;
    const ns={...editItem,id:Date.now(),turns:0,lastPlayed:"刚刚",msgs:[],bookmarks:[],favs:[]};
    setStories(p=>[...p,ns]);setActiveId(ns.id);closeModal();setPage("story");
  };

  // ── ROOT ──────────────────────────────────────────────────────────
  return h('div',{style:{background:t.bg,height:"100vh",display:"flex",flexDirection:"column",
    maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden",
    fontFamily:'"Microsoft YaHei","PingFang SC",sans-serif'}},
    h('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},
  h('div',{style:{display:tab==="推演"?"flex":"none",flex:1,flexDirection:"column",overflow:"hidden"}},TuiYan()),
  h('div',{style:{display:tab==="马甲"?"flex":"none",flex:1,flexDirection:"column",overflow:"hidden"}},MaJia()),
  h('div',{style:{display:tab==="世界观"?"flex":"none",flex:1,flexDirection:"column",overflow:"hidden"}},ShiJieGuan()),
  h('div',{style:{display:tab==="设置"?"flex":"none",flex:1,flexDirection:"column",overflow:"hidden"}},SheZhi())
)

    // bottom nav
    h('div',{style:{position:"absolute",bottom:0,left:0,right:0,background:t.card,borderTop:"1px solid "+t.border,display:"flex",zIndex:50,paddingBottom:"env(safe-area-inset-bottom)"}},
      NAV.map(n=>{
        const active=page===n.id;
        return h('button',{key:n.id,
          onClick:()=>{if(n.id==="story"&&!activeId)return;setPage(n.id);},
          style:{flex:1,padding:"9px 0 6px",background:"none",border:"none",cursor:"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",gap:2,
            opacity:n.id==="story"&&!activeId?0.5:1,transition:"all .15s"}},
          h(Ico,{n:n.n,s:20,c:active?t.accent:t.muted}),
          h('span',{style:{fontSize:9,color:active?t.accent:t.muted,fontWeight:active?600:400}},n.l),
          active&&h('div',{style:{width:4,height:4,borderRadius:"50%",background:t.accent,marginTop:1}})
        );
      })
    ),
    // MODALS
    modal==="char"&&editItem&&h(ModalWrap,{title:editItem.id?"编辑角色":"创建角色",onSave:saveChar},
      h(AvaUpload),
      h(Fld,{label:"角色名字",value:editItem.name,onChange:v=>setEditItem(p=>({...p,name:v})),placeholder:"输入角色名字"}),
      h('div',{style:{marginBottom:13}},
        h('div',{style:{fontSize:11,color:t.muted,marginBottom:7}},"角色颜色"),
        h('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          CHARCOLORS.map(c=>h('button',{key:c,onClick:()=>setEditItem(p=>({...p,color:c})),
            style:{width:26,height:26,borderRadius:"50%",background:c,border:"3px solid "+(editItem.color===c?"#fff":"transparent"),cursor:"pointer"}}))
        )
      ),
      h(Sel,{label:"人称",value:editItem.pronoun,onChange:v=>setEditItem(p=>({...p,pronoun:v})),
        options:[{v:"他",l:"他"},{v:"她",l:"她"},{v:"它",l:"它"},{v:"我",l:"我"},{v:"你",l:"你"},{v:"本王",l:"本王"},{v:"吾",l:"吾"},{v:"本座",l:"本座"}]}),
      h(Sel,{label:"叙事视角",value:editItem.pov,onChange:v=>setEditItem(p=>({...p,pov:v})),
        options:[{v:"第一人称",l:"第一人称（我）"},{v:"第二人称",l:"第二人称（你）"},{v:"第三人称",l:"第三人称（他/她）"}]}),
      h(Fld,{label:"角色设定",value:editItem.setting,onChange:v=>setEditItem(p=>({...p,setting:v})),placeholder:"描述角色的外貌、性格、背景故事…",rows:4})
    ),
    modal==="vest"&&editItem&&h(ModalWrap,{title:editItem.id?"编辑马甲":"创建马甲",onSave:saveVest},
      h(AvaUpload),
      h(Fld,{label:"马甲名字",value:editItem.name,onChange:v=>setEditItem(p=>({...p,name:v})),placeholder:"你在剧情中的名字"}),
      h(Sel,{label:"人称",value:editItem.pronoun,onChange:v=>setEditItem(p=>({...p,pronoun:v})),
        options:[{v:"我",l:"我"},{v:"你",l:"你"},{v:"他",l:"他"},{v:"她",l:"她"},{v:"本王",l:"本王"},{v:"吾",l:"吾"}]}),
      h(Sel,{label:"叙事视角",value:editItem.pov,onChange:v=>setEditItem(p=>({...p,pov:v})),
        options:[{v:"第一人称",l:"第一人称（我）"},{v:"第二人称",l:"第二人称（你）"},{v:"第三人称",l:"第三人称（他/她）"}]}),
      h(Fld,{label:"马甲设定",value:editItem.setting,onChange:v=>setEditItem(p=>({...p,setting:v})),placeholder:"描述你的这个身份…",rows:3})
    ),
    modal==="world"&&editItem&&h(ModalWrap,{title:editItem.id?"编辑世界书":"创建世界书",onSave:saveWorld},
      h(Fld,{label:"世界书名称",value:editItem.name,onChange:v=>setEditItem(p=>({...p,name:v})),placeholder:"例如：仙侠大陆"}),
      h(Fld,{label:"世界观设定（提示词）",value:editItem.prompt,onChange:v=>setEditItem(p=>({...p,prompt:v})),placeholder:"详细描述这个世界的规则、背景、特色…",rows:6})
    ),
    modal==="story"&&editItem&&h(ModalWrap,{title:"新建故事",onSave:saveStory},
      h(Fld,{label:"故事标题",value:editItem.title||"",onChange:v=>setEditItem(p=>({...p,title:v})),placeholder:"给你的故事起个名字"}),
      h(Fld,{label:"类型",value:editItem.genre||"",onChange:v=>setEditItem(p=>({...p,genre:v})),placeholder:"例如：古代奇幻、现代悬疑"})
    ),
    // relation modal
    relModal&&h('div',{style:{position:"fixed",inset:0,background:t.ov,zIndex:200,display:"flex",alignItems:"flex-end"},onClick:()=>setRelModal(null)},
      h('div',{onClick:e=>e.stopPropagation(),className:"slide-up",
        style:{background:t.card,borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxHeight:"60vh",overflowY:"auto",border:"1px solid "+t.border,borderBottom:"none"}},
        h('div',{style:{fontSize:15,fontWeight:700,color:t.text,marginBottom:14}},"「"+relModal.name+"」的角色关系"),
        h('div',{style:{display:"flex",flexDirection:"column",gap:7,marginBottom:14}},
          (relModal.relations||[]).map((r,i)=>h('div',{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 11px",background:t.surf,borderRadius:9,border:"1px solid "+t.border}},
            h('span',{style:{fontSize:12,color:t.text}},r),
            h('button',{onClick:()=>{
              const u={...relModal,relations:relModal.relations.filter((_,j)=>j!==i)};
              setChars(p=>p.map(c=>c.id===u.id?u:c));setRelModal(u);
            },style:{background:"none",border:"none",cursor:"pointer"}},h(Ico,{n:"close",s:14,c:t.danger}))
          ))
        ),
        h('div',{style:{display:"flex",gap:8,marginBottom:14}},
          h('input',{id:"ri",placeholder:"如：与王福是宿敌关系",
            style:{flex:1,background:t.surf,border:"1px solid "+t.border,borderRadius:9,padding:"9px 11px",color:t.text,fontSize:12}}),
          h('button',{onClick:()=>{
            const inp=document.getElementById("ri");if(!inp?.value.trim())return;
            const u={...relModal,relations:[...(relModal.relations||[]),inp.value.trim()]};
            setChars(p=>p.map(c=>c.id===u.id?u:c));setRelModal(u);inp.value="";
          },style:{background:t.accent,border:"none",borderRadius:9,padding:"9px 14px",cursor:"pointer",color:"#fff",fontSize:12,fontFamily:"inherit"}},"添加")
        ),
        h('button',{onClick:()=>setRelModal(null),
          style:{width:"100%",background:t.surf,border:"1px solid "+t.border,borderRadius:9,padding:"10px",cursor:"pointer",color:t.muted,fontSize:13,fontFamily:"inherit"}},"关闭")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
